<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Сообщения (Go + Nginx)</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #0f172a;
      color: #e5e7eb;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }
    .app {
      background: #020617;
      border-radius: 16px;
      padding: 24px;
      width: 100%;
      max-width: 640px;
      box-shadow:
        0 20px 40px rgba(15,23,42,0.9),
        0 0 0 1px rgba(148,163,184,0.2);
    }
    h1 {
      margin: 0 0 4px;
      font-size: 1.6rem;
    }
    .subtitle {
      margin: 0 0 20px;
      font-size: 0.9rem;
      color: #9ca3af;
    }
    label {
      display: block;
      margin-bottom: 8px;
      font-size: 0.9rem;
    }
    textarea {
      width: 100%;
      min-height: 80px;
      resize: vertical;
      padding: 10px 12px;
      border-radius: 10px;
      border: 1px solid #1f2937;
      background: #020617;
      color: #e5e7eb;
      font-family: inherit;
      font-size: 0.95rem;
      outline: none;
      transition: border-color 0.15s, box-shadow 0.15s;
    }
    textarea:focus {
      border-color: #22c55e;
      box-shadow: 0 0 0 1px rgba(34,197,94,0.5);
    }
    .controls {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-top: 10px;
      margin-bottom: 16px;
    }
    button {
      border: none;
      border-radius: 999px;
      padding: 8px 18px;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      background: linear-gradient(135deg, #22c55e, #16a34a);
      color: #022c22;
      box-shadow: 0 10px 18px rgba(34,197,94,0.35);
      transition: transform 0.1s ease, box-shadow 0.1s ease, filter 0.1s ease;
      white-space: nowrap;
    }
    button:hover {
      transform: translateY(-1px);
      filter: brightness(1.03);
      box-shadow: 0 14px 24px rgba(34,197,94,0.45);
    }
    button:active {
      transform: translateY(0);
      box-shadow: 0 8px 14px rgba(34,197,94,0.35);
    }
    button[disabled] {
      opacity: 0.6;
      cursor: default;
      box-shadow: none;
    }
    .status {
      font-size: 0.9rem;
      color: #9ca3af;
    }
    .status--error { color: #f97373; }
    .status--success { color: #4ade80; }
    .divider {
      height: 1px;
      margin: 12px 0 16px;
      border: none;
      background: linear-gradient(to right, transparent, #1f2937, transparent);
    }
    .messages-header {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      margin-bottom: 8px;
    }
    .messages-header h2 {
      font-size: 1.05rem;
      margin: 0;
    }
    .messages-count {
      font-size: 0.85rem;
      color: #9ca3af;
    }
    .messages {
      max-height: 260px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 8px;
      padding-right: 4px;
    }
    .message {
      padding: 10px 12px;
      border-radius: 10px;
      background: radial-gradient(circle at top left, rgba(34,197,94,0.07), transparent 60%);
      border: 1px solid #1f2937;
    }
    .message-text {
      margin: 0 0 4px;
      font-size: 0.95rem;
      white-space: pre-wrap;
      word-wrap: break-word;
    }
    .message-meta {
      font-size: 0.78rem;
      color: #9ca3af;
    }
    .empty {
      font-size: 0.9rem;
      color: #6b7280;
      padding: 8px 0;
    }
    .pill {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 3px 9px;
      border-radius: 999px;
      background: rgba(15,23,42,0.85);
      border: 1px solid rgba(55,65,81,0.7);
      font-size: 0.75rem;
      color: #9ca3af;
    }
    .pill-dot {
      width: 7px;
      height: 7px;
      border-radius: 999px;
      background: #22c55e;
      box-shadow: 0 0 0 4px rgba(34,197,94,0.25);
    }
    @media (max-width: 640px) {
      .app {
        border-radius: 0;
        min-height: 100vh;
        max-width: none;
        box-shadow: none;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;">
      <div>
        <h1>Мини-чат на Go</h1>
        <p class="subtitle">Сервер на Go, хранение сообщений в файле и статика через Nginx.</p>
      </div>
      <div class="pill">
        <span class="pill-dot"></span>
        <span>API: <code>/message</code></span>
      </div>
    </div>

    <section>
      <label for="messageInput">Ваше сообщение</label>
      <textarea id="messageInput" placeholder="Напишите что-нибудь..."></textarea>
      <div class="controls">
        <button id="sendBtn">Отправить</button>
        <span id="status" class="status"></span>
      </div>
    </section>

    <hr class="divider">

    <section>
      <div class="messages-header">
        <h2>Сообщения</h2>
        <span class="messages-count" id="messagesCount"></span>
      </div>
      <div class="messages" id="messages"></div>
      <div class="empty" id="emptyState" style="display:none;">Сообщений пока нет. Будьте первым!</div>
    </section>
  </div>

  <script>
    const API_BASE = '';
    const messageInput = document.getElementById('messageInput');
    const sendBtn = document.getElementById('sendBtn');
    const statusEl = document.getElementById('status');
    const messagesEl = document.getElementById('messages');
    const emptyStateEl = document.getElementById('emptyState');
    const messagesCountEl = document.getElementById('messagesCount');

    function setStatus(text, type) {
      statusEl.textContent = text || '';
      statusEl.className = 'status';
      if (type === 'error') statusEl.classList.add('status--error');
      if (type === 'success') statusEl.classList.add('status--success');
    }

    function formatDate(ts) {
      if (!ts) return '';
      const d = new Date(ts);
      if (isNaN(d)) return '';
      return d.toLocaleString('ru-RU');
    }

    async function fetchMessages() {
      try {
        const res = await fetch(API_BASE + '/message');
        if (!res.ok) throw new Error('HTTP ' + res.status);
        const data = await res.json();
        renderMessages(Array.isArray(data) ? data : []);
      } catch (err) {
        console.error(err);
        setStatus('Не удалось загрузить сообщения', 'error');
      }
    }

    function renderMessages(messages) {
      messagesEl.innerHTML = '';
      if (!messages.length) {
        emptyStateEl.style.display = 'block';
        messagesCountEl.textContent = '';
        return;
      }
      emptyStateEl.style.display = 'none';
      messagesCountEl.textContent = messages.length + ' шт.';

      messages
        .slice()
        .reverse()
        .forEach((m) => {
          const div = document.createElement('div');
          div.className = 'message';
          div.innerHTML = `
            <p class="message-text"></p>
            <div class="message-meta">${formatDate(m.timestamp)}</div>
          `;
          div.querySelector('.message-text').textContent = m.text || '';
          messagesEl.appendChild(div);
        });
    }

    async function sendMessage() {
      const text = messageInput.value.trim();
      if (!text) {
        setStatus('Введите сообщение', 'error');
        return;
      }

      sendBtn.disabled = true;
      setStatus('Отправка...', null);

      try {
        const res = await fetch(API_BASE + '/message', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ text })
        });
        const data = await res.json().catch(() => ({}));

        if (!res.ok) {
          const msg = (data && data.error) || ('Ошибка: HTTP ' + res.status);
          throw new Error(msg);
        }

        setStatus('Сообщение сохранено', 'success');
        messageInput.value = '';
        await fetchMessages();
      } catch (err) {
        console.error(err);
        setStatus(err.message || 'Ошибка при отправке', 'error');
      } finally {
        sendBtn.disabled = false;
      }
    }

    sendBtn.addEventListener('click', sendMessage);
    messageInput.addEventListener('keydown', (e) => {
      if ((e.metaKey || e.ctrlKey) && e.key === 'Enter') {
        sendMessage();
      }
    });

    fetchMessages();
  </script>
</body>
</html>
